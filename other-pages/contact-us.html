<!DOCTYPE html>
<html>
    <head>
        <title>Contact Us</title>

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Ribeye&display=swap" rel="stylesheet">

        <style>
            body {
                background-color: #a98b76;
                color: #F3E4C9;
                font-family: "Ribeye", serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }
            nav {
                width: 100%;
            }
            .nav-bar {
                background-color: #765d49;
                margin: 15px 0px;
                display: flex;
            }
            .material-symbols-outlined {
                font-size: 35px;
                margin-top: 10px;
                color: #BABF94;
                font-variation-settings:
                    'FILL' 0,
                    'wght' 400,
                    'GRAD' 0,
                    'opsz' 24;
                cursor: pointer;
            }
            .nav-bar li {
                list-style: none;
                display: flex;
            }    
            a {
                color: #BABF94;
                text-decoration: none;
                font-size: 25px;
                font-family: "Ribeye", serif;
                margin-left: 40px;
                display: block;
                padding: 10px 40px; 
                text-align: center;
                cursor: pointer;
                transition-duration: 0.1s;   
            }
            .nav-bar a:hover {
                background-color: #BABF94;
                color: #765d49;
                }
            .nav-bar a:active {
                background-color: #a5aa80;
                color: #624e41;
            }
            .last-el {
                margin-left: auto;
                margin-right: 10px;
            }
            .card {
                background-color: #BABF94;
                padding: 2em;
                border-color: #6f7162;
                border-style: dashed;
                border-width: 4px;
                box-shadow: 0 4px 12px #6f7162;
                border-radius: 4px;
                margin-top: 40px ;
                width: 45%;
                height: 450px;
                
            }
            .card h2 {
                text-align: center;
                font-size: 45px;
                margin: 0;   
            }
            .input-div {
                font-size: 20px;
                margin-top: 15px;
                
            }
            input,
            textarea {
                width: 100%;
                padding: .5rem;
                margin-top: .3rem;
                border: 1px solid #6f7162;
                border-radius: 4px;
                font-size: 1rem;
                box-sizing: border-box;
                background: #fcffee;
                color: #876e5d;
                
            }
            .card textarea {
                resize: vertical;
                min-height: 80px;
            }
            button {
            margin-top: 24px;          
            width: 100%;                 
            padding: .4rem;              
            background: #977c68;         
            color: #F3E4C9;             
            border-color: #876e5d; 
            border-style: solid;               
            border-radius: 4px;          
            font-size: 1.5rem;
            font-family: "Ribeye", serif;
            box-shadow: 0 4px 6px rgba(88, 97, 77, 0.4);          
            cursor: pointer;
            }
            button:hover {
                background: #715a4b;         
                color: #ffecd9;
            }
            button:active {
                background: #624e41;         
                color: #fff4e9;
                box-shadow: none;
                margin-top: 28px;
            }
        </style>
    </head>
    <body>
        <nav>
            <div>
                <ul class="nav-bar">
                    <span class="material-symbols-outlined">
                    menu
                    </span>
                    <li><a href="..\index.html" id="current-nav">Home</a></li>
                    <li><a href="">Gallery</a></li>
                    <li><a href="find-us.html">Find Us</a></li>
                    <li><a href="contact-us.html">Contact Us</a></li>
                    <span class="last-el"><li><a href="">Cart</a></li></span>
                </ul>
            </div>
        </nav>
        <div class="card">

            <h2>Contact Us</h2>
            <form>
                <div class="input-div">
                    <label for="name">Name : </label>
                    <input type="text" id="name" placeholder="Enter Your Name.." required>
                </div>
                <div class="input-div">
                    <label for="email">Email : </label>
                    <input type="email" id="email" placeholder="Enter Your Email Address.." required>
                </div>
                <div class="input-div">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit">Send</button>
            </form>
        </div>
    </body>
</html>
